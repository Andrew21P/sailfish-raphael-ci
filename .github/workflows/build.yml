name: Build SailfishOS for raphael

on:
  workflow_dispatch:
    inputs:
      skip_hal:
        description: 'Skip HAL build (use artifacts from another run)'
        type: boolean
        default: false
      hal_run_id:
        description: 'HAL run ID (if skip_hal is true)'
        type: string
        default: ''

env:
  ANDROID_ROOT: /home/runner/work/halium
  DEVICE: raphael
  VENDOR: xiaomi
  SAILFISH_SDK_VERSION: "5.0.0.43"

jobs:
  build-hal:
    if: ${{ inputs.skip_hal != true }}
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          df -h

      - name: Cache Android source
        uses: actions/cache@v4
        with:
          path: |
            ~/bin/repo
            ${{ env.ANDROID_ROOT }}/.repo
          key: ${{ runner.os }}-android-repo-hybris18-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-android-repo-hybris18-

      - name: Build HAL
        run: |
          chmod +x ${{ github.workspace }}/.github/scripts/build-hal.sh
          ${{ github.workspace }}/.github/scripts/build-hal.sh
        env:
          ANDROID_ROOT: ${{ env.ANDROID_ROOT }}
          DEVICE: ${{ env.DEVICE }}

      - name: Fix permissions
        run: |
          chmod +x ${{ github.workspace }}/.github/scripts/fix-permissions.sh
          ${{ github.workspace }}/.github/scripts/fix-permissions.sh
        env:
          ANDROID_ROOT: ${{ env.ANDROID_ROOT }}
          DEVICE: ${{ env.DEVICE }}

      - name: Upload HAL Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hal-output
          path: |
            ${{ env.ANDROID_ROOT }}/out/target/product/${{ env.DEVICE }}/
            ${{ env.ANDROID_ROOT }}/out/soong/.intermediates/
            ${{ env.ANDROID_ROOT }}/system/core/
            ${{ env.ANDROID_ROOT }}/system/libbase/
            ${{ env.ANDROID_ROOT }}/system/tools/
            ${{ env.ANDROID_ROOT }}/build/make/
            ${{ env.ANDROID_ROOT }}/build/core/
            ${{ env.ANDROID_ROOT }}/build/soong/
            ${{ env.ANDROID_ROOT }}/hybris/hybris-boot/
          retention-days: 14

  build-dhd:
    needs: build-hal
    if: ${{ always() && (needs.build-hal.result == 'success' || needs.build-hal.result == 'skipped') }}
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download HAL Artifacts (from current run)
        if: ${{ inputs.skip_hal != true }}
        uses: actions/download-artifact@v4
        with:
          name: hal-output
          path: ${{ env.ANDROID_ROOT }}/

      - name: Download HAL Artifacts (from specified run)
        if: ${{ inputs.skip_hal == true && inputs.hal_run_id != '' }}
        uses: actions/download-artifact@v4
        with:
          name: hal-output
          path: ${{ env.ANDROID_ROOT }}/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.hal_run_id }}

      - name: Setup DHD environment
        run: |
          chmod +x ${{ github.workspace }}/.github/scripts/setup-dhd.sh
          ${{ github.workspace }}/.github/scripts/setup-dhd.sh
        env:
          ANDROID_ROOT: ${{ env.ANDROID_ROOT }}
          DEVICE: ${{ env.DEVICE }}
          WORKSPACE: ${{ github.workspace }}

      - name: Build DHD in Docker
        run: |
          sudo docker run --privileged \
            -v /home/runner/work:/home/mersdk/work \
            coderus/sailfishos-platform-sdk:${{ env.SAILFISH_SDK_VERSION }} \
            /bin/sh /home/mersdk/work/sailfish-raphael-ci/sailfish-raphael-ci/build-rpm.sh

      - name: Upload SailfishOS ZIP
        uses: actions/upload-artifact@v4
        with:
          name: sailfishos-zip
          path: |
            ${{ env.ANDROID_ROOT }}/SailfishOScommunity-*/sailfishos-*.zip
            ${{ env.ANDROID_ROOT }}/SailfishOS-*/sailfishos-*.zip
            ${{ env.ANDROID_ROOT }}/SailfishOScommunity-*/*.zip
            ${{ env.ANDROID_ROOT }}/SailfishOS-*/*.zip

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            ${{ env.ANDROID_ROOT }}/SailfishOScommunity-*/*-${{ env.DEVICE }}*.zip
            ${{ env.ANDROID_ROOT }}/SailfishOS-*/*-${{ env.DEVICE }}*.zip
