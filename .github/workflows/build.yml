#=================================================
# Sailfish OS CI Build for Xiaomi Mi 9T Pro (raphael)
# Based on sailfish-on-davinci project structure
# Uses hybris-18.1 (Android 11) for SM8150
#=================================================

name: Build SailfishOS for raphael

on: 
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      name:
        description: 'trigger to build'
        required: true
        default: 'run'
      skip_hal:
        description: 'Skip HAL build (use existing artifact)'
        required: false
        type: boolean
        default: false
      hal_run_id:
        description: 'Run ID to download HAL artifact from (if skip_hal=true)'
        required: false
        type: string
        default: ''

permissions:
  contents: write

env:
  DEVICE: raphael
  VENDOR: xiaomi
  ANDROID_ROOT: /home/runner/work/sailfish-raphael-ci/sailfish-raphael-ci/hadk_18.1
  SAILFISH_SDK_VERSION: 5.0.0.43
  SAILFISH_OS_VERSION: 5.0.0.71

jobs:
  #=================================================
  # Job 1: Sync Android sources and cache
  #=================================================
  prep-source:
    runs-on: ubuntu-22.04
    if: ${{ inputs.skip_hal != true }}
    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 20480
          swap-size-mb: 1024
          remove-dotnet: 'true'
          remove-haskell: 'true'
          remove-android: 'true'
          remove-docker-images: 'true'

      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Repo Tool & Source
        id: cache-android
        uses: actions/cache@v4
        with:
          path: |
            ~/bin/repo
            ${{ env.ANDROID_ROOT }}/.repo
          key: ${{ runner.os }}-android-repo-hybris18-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-android-repo-hybris18-

      - name: Download repo bin
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          git config --global user.email "ci@github.com"
          git config --global user.name "Github Actions"

      - name: Repo Sync hybris-18.1
        run: |
          mkdir -p $ANDROID_ROOT
          cd $ANDROID_ROOT
          # Use official mer-hybris manifest for hybris-18.1 (Android 11)
          python3 ~/bin/repo init -u https://github.com/mer-hybris/android.git -b hybris-18.1 --depth=1
          python3 ~/bin/repo sync -j$(nproc --all) -c --no-clone-bundle --no-tags --optimized-fetch --prune --force-sync

  #=================================================
  # Job 2: Build Android HAL
  #=================================================
  build-hal:
    needs: prep-source
    runs-on: ubuntu-22.04
    if: ${{ inputs.skip_hal != true }}
    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 30720
          swap-size-mb: 1024
          remove-dotnet: 'true'
          remove-haskell: 'true'
          remove-android: 'true'
          remove-docker-images: 'true'

      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore Repo Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/bin/repo
            ${{ env.ANDROID_ROOT }}/.repo
          key: ${{ runner.os }}-android-repo-hybris18-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-android-repo-hybris18-

      - name: Prepare Environment & Build
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            openjdk-8-jdk android-tools-adb bc bison \
            build-essential curl flex gnupg gperf \
            imagemagick lib32ncurses-dev lib32readline-dev lib32z1-dev \
            liblz4-tool libncurses5-dev libsdl1.2-dev libssl-dev \
            libxml2 libxml2-utils lzop pngcrush rsync schedtool \
            squashfs-tools xsltproc yasm zip zlib1g-dev \
            qemu-user-static qemu-system-arm e2fsprogs simg2img \
            libtinfo5 libncurses5 gzip virtualenv git python2 \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
            clang lld llvm

          # Setup JDK
          export JAVA_HOME=/usr/lib/jvm/java-8-openjdk-amd64/
          export PATH=$JAVA_HOME/bin:$PATH

          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          git config --global user.email "ci@github.com"
          git config --global user.name "Github Actions"
          git config --global --add safe.directory '*'

          # Create directory and sync from cache
          mkdir -p $ANDROID_ROOT
          cd $ANDROID_ROOT
          
          # If .repo exists from cache, use local sync; otherwise full init+sync
          if [ -d ".repo" ]; then
            echo "Cache found, running local checkout..."
            python3 ~/bin/repo sync -l -j$(nproc --all) || python3 ~/bin/repo sync -j$(nproc --all) -c --no-clone-bundle --no-tags
          else
            echo "No cache, running full init+sync..."
            python3 ~/bin/repo init -u https://github.com/mer-hybris/android.git -b hybris-18.1 --depth=1
            python3 ~/bin/repo sync -j$(nproc --all) -c --no-clone-bundle --no-tags --optimized-fetch --prune --force-sync
          fi

          #------------------------------------------
          # Clone device-specific repos for raphael
          # Using PixelExperience repos (have aosp_raphael.mk target)
          # ALL URLS VERIFIED 2026-02-18
          #------------------------------------------
          # Device tree (PixelExperience eleven branch) - VERIFIED - has aosp_raphael.mk
          rm -rf $ANDROID_ROOT/device/xiaomi/raphael || true
          git clone https://github.com/PixelExperience-Devices/device_xiaomi_raphael.git \
            $ANDROID_ROOT/device/xiaomi/raphael --depth=1 -b eleven

          # Kernel (PixelExperience eleven branch) - VERIFIED
          rm -rf $ANDROID_ROOT/kernel/xiaomi/raphael || true
          git clone https://github.com/PixelExperience-Devices/kernel_xiaomi_raphael.git \
            $ANDROID_ROOT/kernel/xiaomi/raphael --depth=1 -b eleven

          # Patch kernel IPA driver - fix copy_from_user buffer size mismatch (GCC 11+ issue)
          # Error: __bad_copy_to in ipa_hw_stats.c:2072
          IPA_FILE="$ANDROID_ROOT/kernel/xiaomi/raphael/drivers/platform/msm/ipa/ipa_v3/ipa_hw_stats.c"
          IPA_MAKEFILE="$ANDROID_ROOT/kernel/xiaomi/raphael/drivers/platform/msm/ipa/ipa_v3/Makefile"
          
          if [ -f "$IPA_FILE" ]; then
            echo "Patching IPA driver for GCC 11+ compatibility..."
            # Fix: Increase all small debugfs buffer sizes to 64 bytes using perl
            perl -i -pe 's/char\s+dbg_buff\s*\[\s*\d+\s*\]/char dbg_buff[64]/g' "$IPA_FILE"
            # Fix: Replace copy_from_user(dbg_buff, ..., count) with safe min() version
            perl -i -pe 's/copy_from_user\s*\(\s*dbg_buff\s*,\s*(\w+)\s*,\s*count\s*\)/copy_from_user(dbg_buff, $1, min_t(size_t, count, sizeof(dbg_buff) - 1))/g' "$IPA_FILE"
            echo "Patched ipa_hw_stats.c buffer sizes and copy_from_user calls"
          fi
          
          # Add per-file CFLAGS to disable fortify for problematic file
          if [ -f "$IPA_MAKEFILE" ]; then
            echo "" >> "$IPA_MAKEFILE"
            echo "# Disable FORTIFY_SOURCE for GCC 11+ compatibility" >> "$IPA_MAKEFILE"
            echo 'CFLAGS_ipa_hw_stats.o += -U_FORTIFY_SOURCE -D_FORTIFY_SOURCE=0 -Wno-error' >> "$IPA_MAKEFILE"
            echo "Added per-file CFLAGS to IPA Makefile"
          fi

          # Disable FORTIFY_SOURCE, HARDENED_USERCOPY, COMPAT_VDSO, MODVERSIONS, QCOM_RTIC, and KALLSYMS_BASE_RELATIVE in defconfig
          DEFCONFIG="$ANDROID_ROOT/kernel/xiaomi/raphael/arch/arm64/configs/raphael_user_defconfig"
          if [ -f "$DEFCONFIG" ]; then
            # Remove any existing related configs
            sed -i '/CONFIG_FORTIFY_SOURCE/d' "$DEFCONFIG"
            sed -i '/CONFIG_HARDENED_USERCOPY/d' "$DEFCONFIG"
            sed -i '/CONFIG_COMPAT_VDSO/d' "$DEFCONFIG"
            sed -i '/CONFIG_MODVERSIONS/d' "$DEFCONFIG"
            sed -i '/CONFIG_QCOM_RTIC/d' "$DEFCONFIG"
            sed -i '/CONFIG_KALLSYMS_BASE_RELATIVE/d' "$DEFCONFIG"
            echo "# CONFIG_FORTIFY_SOURCE is not set" >> "$DEFCONFIG"
            echo "# CONFIG_HARDENED_USERCOPY is not set" >> "$DEFCONFIG"
            echo "# CONFIG_COMPAT_VDSO is not set" >> "$DEFCONFIG"
            echo "# CONFIG_MODVERSIONS is not set" >> "$DEFCONFIG"
            echo "# CONFIG_QCOM_RTIC is not set" >> "$DEFCONFIG"
            echo "# CONFIG_KALLSYMS_BASE_RELATIVE is not set" >> "$DEFCONFIG"
            echo "Disabled FORTIFY_SOURCE, HARDENED_USERCOPY, COMPAT_VDSO, MODVERSIONS, QCOM_RTIC, KALLSYMS_BASE_RELATIVE in defconfig"
          fi
          
          # DEFINITIVE FIX for selinux_state RTIC relocation overflow
          # The problem: selinux_state is in .bss.rtic section which is placed far from .text
          # causing R_AARCH64_ADR_PREL_PG_HI21 overflow (±4GB limit exceeded)
          
          KERNEL_DIR="$ANDROID_ROOT/kernel/xiaomi/raphael"
          echo "=== RTIC FIX: The problem is __rticdata attribute on selinux_state ==="
          
          # Show the selinux_state declaration BEFORE
          echo "=== BEFORE - selinux_state declaration in hooks.c ==="
          grep -n "selinux_state" "$KERNEL_DIR/security/selinux/hooks.c" | head -5 || true
          
          # CORRECT FIX: Redefine __rticdata to nothing (don't remove it - that breaks #define)
          # Find and replace the #define __rticdata line in header files
          echo "=== Redefining __rticdata to empty ==="
          
          # Replace the __rticdata definition in init.h (where it's defined)
          sed -i 's/#define __rticdata.*__attribute__.*section.*bss\.rtic.*/#define __rticdata \/\* disabled \*\//' "$KERNEL_DIR/include/linux/init.h"
          
          # Also check rtic_mp.h
          if [ -f "$KERNEL_DIR/include/linux/rtic_mp.h" ]; then
            sed -i 's/#define __rticdata.*/#define __rticdata \/\* disabled \*\//' "$KERNEL_DIR/include/linux/rtic_mp.h"
          fi
          
          # Show the patched definition
          echo "=== AFTER - __rticdata definition ==="
          grep -n "__rticdata" "$KERNEL_DIR/include/linux/init.h" || true
          
          # Show AFTER patching
          echo "=== AFTER - selinux_state declaration in hooks.c ==="
          grep -n "selinux_state" "$KERNEL_DIR/security/selinux/hooks.c" | head -5 || true
          
          # FIX kallsyms relative mode overflow - patch Kconfig to disable BASE_RELATIVE
          # The defconfig change might not be enough, so patch the Kconfig default
          echo "=== Patching KALLSYMS_BASE_RELATIVE to default n ==="
          sed -i 's/config KALLSYMS_BASE_RELATIVE/config KALLSYMS_BASE_RELATIVE\n\tdefault n\n\t# Patched by sailfish-raphael-ci - original default follows/' "$KERNEL_DIR/init/Kconfig" || true
          
          # Also patch scripts/kallsyms.c to not use relative mode (belt and suspenders)
          if [ -f "$KERNEL_DIR/scripts/kallsyms.c" ]; then
            echo "=== Patching kallsyms.c to force absolute mode ==="
            # Set base_relative to 0 always
            sed -i 's/static int base_relative;/static int base_relative = 0; \/\/ Forced to absolute mode/' "$KERNEL_DIR/scripts/kallsyms.c"
            sed -i 's/int base_relative = 1;/int base_relative = 0; \/\/ Forced to absolute mode/' "$KERNEL_DIR/scripts/kallsyms.c"
          fi
          
          # FIX DTS overlay syntax error in raphael-pinctrl.dtsi
          # The file references &tlmm but needs proper preprocessing
          # Add missing header to make it valid for overlay compilation
          PINCTRL_DTSI="$KERNEL_DIR/arch/arm64/boot/dts/qcom/raphael-pinctrl.dtsi"
          if [ -f "$PINCTRL_DTSI" ]; then
            echo "=== Fixing raphael-pinctrl.dtsi DTS syntax ==="
            # Check if file already has a dts-v1 header
            if ! grep -q "/dts-v1/" "$PINCTRL_DTSI"; then
              # Create temp file with proper header for overlay included files
              echo "/* Auto-fixed for overlay compilation */" > /tmp/pinctrl_fixed.dtsi
              cat "$PINCTRL_DTSI" >> /tmp/pinctrl_fixed.dtsi
              mv /tmp/pinctrl_fixed.dtsi "$PINCTRL_DTSI"
            fi
          fi
          
          # Also fix the overlay file to ensure proper syntax
          OVERLAY_DTS="$KERNEL_DIR/arch/arm64/boot/dts/qcom/raphael-sm8150-overlay.dts"
          if [ -f "$OVERLAY_DTS" ]; then
            echo "=== Checking raphael-sm8150-overlay.dts ==="
            head -10 "$OVERLAY_DTS"
          fi
          
          # If dtbo build fails, we can skip it - hybris needs DTB not DTBO
          # Disable only DTBO overlays, keep base DTBs building
          QCOM_DTS_MAKEFILE="$KERNEL_DIR/arch/arm64/boot/dts/qcom/Makefile"
          if [ -f "$QCOM_DTS_MAKEFILE" ]; then
            echo "=== Disabling raphael DTBO build only (keeping base DTBs) ==="
            # Only disable overlay dtbo files, be very specific
            sed -i '/raphael.*overlay.*dtbo/d' "$QCOM_DTS_MAKEFILE"
            sed -i '/dtbo.*raphael.*overlay/d' "$QCOM_DTS_MAKEFILE"
          fi
          
          # Ensure we use Image.gz format (without appended DTB - hybris uses separate dtb)
          # Patch BoardConfig to use BOARD_KERNEL_IMAGE_NAME := Image.gz
          if [ -f device/xiaomi/raphael/BoardConfig.mk ]; then
            echo "" >> device/xiaomi/raphael/BoardConfig.mk
            echo "# Use Image.gz without appended DTB for hybris" >> device/xiaomi/raphael/BoardConfig.mk
            echo "BOARD_KERNEL_IMAGE_NAME := Image.gz" >> device/xiaomi/raphael/BoardConfig.mk
          fi
          
          # Add KCFLAGS and clang vars to BoardConfig for kernel build
          if [ -f device/xiaomi/raphael/BoardConfig.mk ]; then
            if ! grep -q "KCFLAGS" device/xiaomi/raphael/BoardConfig.mk; then
              echo "" >> device/xiaomi/raphael/BoardConfig.mk
              echo "# Use clang for kernel build (avoids GCC 11 relocation errors)" >> device/xiaomi/raphael/BoardConfig.mk
              echo 'KERNEL_MAKE_FLAGS += KCFLAGS="-Wno-error -Wno-unused-but-set-variable -Wno-unused-variable -U_FORTIFY_SOURCE -D_FORTIFY_SOURCE=0"' >> device/xiaomi/raphael/BoardConfig.mk
              echo 'KERNEL_MAKE_FLAGS += CROSS_COMPILE=aarch64-linux-gnu-' >> device/xiaomi/raphael/BoardConfig.mk
              echo 'KERNEL_MAKE_FLAGS += CROSS_COMPILE_ARM32=arm-linux-gnueabi-' >> device/xiaomi/raphael/BoardConfig.mk
              echo 'KERNEL_MAKE_FLAGS += CC=clang' >> device/xiaomi/raphael/BoardConfig.mk
              echo 'KERNEL_MAKE_FLAGS += CLANG_TRIPLE=aarch64-linux-gnu-' >> device/xiaomi/raphael/BoardConfig.mk
            fi
          fi

          # Hardware Xiaomi (LineageOS - used by PE too)
          rm -rf $ANDROID_ROOT/hardware/xiaomi || true
          git clone https://github.com/LineageOS/android_hardware_xiaomi.git \
            -b lineage-18.1 $ANDROID_ROOT/hardware/xiaomi --depth=1 --single-branch || true

          # Qualcomm Display HAL (critical for SM8150/Adreno 640) - VERIFIED
          rm -rf $ANDROID_ROOT/hardware/qcom-caf/sm8150/display || true
          mkdir -p $ANDROID_ROOT/hardware/qcom-caf/sm8150
          git clone https://github.com/LineageOS/android_hardware_qcom_display.git \
            -b lineage-18.1-caf-sm8150 $ANDROID_ROOT/hardware/qcom-caf/sm8150/display --depth=1

          # Qualcomm Audio HAL (SM8150) - VERIFIED
          rm -rf $ANDROID_ROOT/hardware/qcom-caf/sm8150/audio || true
          git clone https://github.com/LineageOS/android_hardware_qcom_audio.git \
            -b lineage-18.1-caf-sm8150 $ANDROID_ROOT/hardware/qcom-caf/sm8150/audio --depth=1

          # Qualcomm Media HAL (SM8150) - VERIFIED  
          rm -rf $ANDROID_ROOT/hardware/qcom-caf/sm8150/media || true
          git clone https://github.com/LineageOS/android_hardware_qcom_media.git \
            -b lineage-18.1-caf-sm8150 $ANDROID_ROOT/hardware/qcom-caf/sm8150/media --depth=1

          #------------------------------------------
          # Create vendor stubs (minimal for hybris-hal)
          #------------------------------------------
          mkdir -p $ANDROID_ROOT/vendor/xiaomi/raphael
          {
            echo '# Stub vendor makefile for hybris build'
            echo 'PRODUCT_SOONG_NAMESPACES += vendor/xiaomi/raphael'
          } > $ANDROID_ROOT/vendor/xiaomi/raphael/raphael-vendor.mk
          
          {
            echo '// Stub Android.bp for hybris build'
            echo 'soong_namespace {'
            echo '}'
          } > $ANDROID_ROOT/vendor/xiaomi/raphael/Android.bp
          
          echo '# Stub BoardConfig for hybris' > $ANDROID_ROOT/vendor/xiaomi/raphael/BoardConfigVendor.mk

          #------------------------------------------
          # Patch device tree for hybris compatibility
          #------------------------------------------
          # Fix kernel path (PE uses kernel/xiaomi/raphael, not sm8150)
          if [ -f "$ANDROID_ROOT/device/xiaomi/raphael/BoardConfig.mk" ]; then
            sed -i 's|kernel/xiaomi/sm8150|kernel/xiaomi/raphael|g' \
              $ANDROID_ROOT/device/xiaomi/raphael/BoardConfig.mk || true
          fi
          
          # Remove lineage fingerprint inscreen dependency (causes build error)
          sed -i '/vendor.lineage.biometrics.fingerprint.inscreen/d' \
            $ANDROID_ROOT/device/xiaomi/raphael/device.mk || true
          sed -i '/XiaomiParts/d' \
            $ANDROID_ROOT/device/xiaomi/raphael/device.mk || true

          #------------------------------------------
          # Replace hybris-boot with fixup-mountpoints
          #------------------------------------------
          rm -rf $ANDROID_ROOT/hybris/hybris-boot || true
          git clone https://github.com/mer-hybris/hybris-boot.git \
            $ANDROID_ROOT/hybris/hybris-boot --depth=1

          #------------------------------------------
          # Inject raphael fixup-mountpoints
          #------------------------------------------
          FIXUP_FILE="$ANDROID_ROOT/hybris/hybris-boot/fixup-mountpoints"
          if [ -f "$FIXUP_FILE" ] && ! grep -q '"raphael"' "$FIXUP_FILE"; then
            # Create raphael fixup content
            cat > /tmp/raphael_fixups.txt << 'EOF'
          "raphael"|"raphaelin")
              # Xiaomi Mi 9T Pro - SM8150 - Verified 2025-02-17
              sed -i \
                  -e 's block/bootdevice/by-name/boot sde49 ' \
                  -e 's block/bootdevice/by-name/recovery sda28 ' \
                  -e 's block/bootdevice/by-name/dtbo sde45 ' \
                  -e 's block/bootdevice/by-name/system sde54 ' \
                  -e 's block/bootdevice/by-name/vendor sde53 ' \
                  -e 's block/bootdevice/by-name/userdata sda31 ' \
                  -e 's block/bootdevice/by-name/cache sda29 ' \
                  -e 's block/bootdevice/by-name/persist sda23 ' \
                  -e 's block/bootdevice/by-name/misc sda11 ' \
                  -e 's block/bootdevice/by-name/modem sde52 ' \
                  -e 's block/bootdevice/by-name/dsp sde48 ' \
                  -e 's block/bootdevice/by-name/bluetooth sde26 ' \
                  -e 's block/bootdevice/by-name/vbmeta sde10 ' \
                  -e 's block/bootdevice/by-name/vbmeta_system sde47 ' \
                  -e 's block/bootdevice/by-name/abl sde17 ' \
                  -e 's block/bootdevice/by-name/xbl sdb2 ' \
                  -e 's block/bootdevice/by-name/xbl_config sdb1 ' \
                  -e 's block/bootdevice/by-name/tz sde19 ' \
                  -e 's block/bootdevice/by-name/hyp sde21 ' \
                  -e 's block/bootdevice/by-name/keymaster sde31 ' \
                  -e 's block/bootdevice/by-name/cmnlib sde27 ' \
                  -e 's block/bootdevice/by-name/cmnlib64 sde29 ' \
                  -e 's block/bootdevice/by-name/devcfg sde33 ' \
                  -e 's block/bootdevice/by-name/qupfw sde35 ' \
                  -e 's block/bootdevice/by-name/storsec sde37 ' \
                  -e 's block/bootdevice/by-name/modemst1 sdf2 ' \
                  -e 's block/bootdevice/by-name/modemst2 sdf3 ' \
                  -e 's block/bootdevice/by-name/fsc sdf5 ' \
                  -e 's block/bootdevice/by-name/fsg sdf1 ' \
                  -e 's block/bootdevice/by-name/aop sde11 ' \
                  -e 's block/bootdevice/by-name/cust sda30 ' \
                  -e 's block/bootdevice/by-name/logo sde46 ' \
                  -e 's block/bootdevice/by-name/splash sda19 ' \
                  -e 's block/bootdevice/by-name/keystore sda20 ' \
                  -e 's block/bootdevice/by-name/frp sda21 ' \
                  -e 's block/bootdevice/by-name/logfs sda18 ' \
                  -e 's block/bootdevice/by-name/devinfo sda7 ' \
                  -e 's block/bootdevice/by-name/product sde55 ' \
                  -e 's block/bootdevice/by-name/metadata sda19 ' \
                  -e 's block/by-name/metadata sda19 ' \
                  "$@"
              ;;
          EOF
            # Fix indentation for fixup-mountpoints (needs 4-space indent)
            sed -i 's/^          /    /' /tmp/raphael_fixups.txt
            # Insert before *)
            sed -i '/^[[:space:]]*\*)$/e cat /tmp/raphael_fixups.txt' "$FIXUP_FILE" || {
              head -n -20 "$FIXUP_FILE" > /tmp/fixup_temp
              cat /tmp/raphael_fixups.txt >> /tmp/fixup_temp
              tail -20 "$FIXUP_FILE" >> /tmp/fixup_temp
              mv /tmp/fixup_temp "$FIXUP_FILE"
            }
            echo "Added raphael to fixup-mountpoints"
          fi

          #------------------------------------------
          # Clean up ROM-specific dependencies for hybris
          #------------------------------------------
          # Remove problematic PE/LineageOS-specific stuff
          rm -rf device/xiaomi/raphael/XiaomiParts || true
          rm -rf device/xiaomi/raphael/parts || true
          rm -rf device/xiaomi/raphael/fod || true
          
          # Remove aosp.dependencies to avoid pulling more repos
          rm -f device/xiaomi/raphael/aosp.dependencies || true
          rm -f device/xiaomi/raphael/lineage.dependencies || true

          #------------------------------------------
          # Clone droidmedia
          #------------------------------------------
          rm -rf external/droidmedia || true
          git clone --recurse-submodules https://github.com/sailfishos/droidmedia.git external/droidmedia
          cd external/droidmedia
          git checkout 0.20230605.1 || true
          echo 'MINIMEDIA_AUDIOPOLICYSERVICE_ENABLE := 1' > env.mk
          echo 'AUDIOPOLICYSERVICE_ENABLE := 1' >> env.mk

          #------------------------------------------
          # Clone libhybris
          #------------------------------------------
          cd $ANDROID_ROOT/external
          rm -rf libhybris || true
          git clone --recurse-submodules https://github.com/mer-hybris/libhybris.git

          #------------------------------------------
          # Apply hybris-patches
          #------------------------------------------
          cd $ANDROID_ROOT
          hybris-patches/apply-patches.sh --mb || true

          #------------------------------------------
          # Build HAL
          #------------------------------------------
          sudo ln -sf /usr/bin/python2.7 /usr/bin/python || true
          
          # CRITICAL: Only remove the specific problematic file, NOT the whole vendor/lineage
          # PATH_OVERRIDE_SOONG is in vendor/lineage/build/soong/Android.bp
          rm -f vendor/lineage/build/soong/Android.bp || true
          
          # Create stub envsetup.sh if missing
          mkdir -p vendor/lineage/build
          if [ ! -f vendor/lineage/build/envsetup.sh ]; then
            echo 'function fixup_common_out_dir() { :; }' > vendor/lineage/build/envsetup.sh
          fi
          
          # Create vendor/aosp stubs for PE device tree
          mkdir -p vendor/aosp/build vendor/aosp/config
          echo 'function fixup_common_out_dir() { :; }' > vendor/aosp/build/envsetup.sh
          {
            echo '# Stub for hybris build'
            echo '$(call inherit-product, $(SRC_TARGET_DIR)/product/aosp_base_telephony.mk)'
          } > vendor/aosp/config/common_full_phone.mk
          
          #------------------------------------------
          # CREATE ALL CC_DEFAULTS STUBS RIGHT BEFORE BUILD
          # Comprehensive list to avoid endless fixing
          #------------------------------------------
          echo "Creating cc_defaults stubs for hybris build..."
          
          # Create a ROOT LEVEL stub file - soong scans all .bp files from root
          {
            echo '// Comprehensive cc_defaults stubs for hybris-18.1 build'
            echo '// Based on vendor/lineage and vendor/aosp soong modules'
            echo ''
            # Core defaults
            echo 'cc_defaults { name: "bootloader_message_offset_defaults", }'
            echo 'cc_defaults { name: "vold_hw_fde_defaults", }'
            echo 'cc_defaults { name: "vold_hw_fde_perf_defaults", }'
            echo 'cc_defaults { name: "process_sdk_version_overrides_defaults", }'
            echo 'cc_defaults { name: "shim_libs_defaults", }'
            echo 'cc_defaults { name: "has_memfd_backport_defaults", }'
            echo 'cc_defaults { name: "lineage_go_defaults", }'
            echo 'cc_defaults { name: "target_fs_config_gen_defaults", }'
            echo 'cc_defaults { name: "sdclang_defaults", }'
            echo 'cc_defaults { name: "libhidl_defaults", }'
            echo 'cc_defaults { name: "vendor_init_defaults", }'
            # Qcom specific
            echo 'cc_defaults { name: "stagefright_qcom_legacy_defaults", }'
            echo 'cc_defaults { name: "librmnetctl_pre_uplink_defaults", }'
            echo 'cc_defaults { name: "disable_postrender_cleanup_defaults", }'
            echo 'cc_defaults { name: "surfaceflinger_qcom_ext_defaults", }'
            echo 'cc_defaults { name: "legacy_hw_disk_encryption_defaults", }'
            echo 'cc_defaults { name: "qti_cryptfshw_qsee_defaults", }'
            echo 'cc_defaults { name: "qti_camera_device_defaults", }'
            echo 'cc_defaults { name: "qti_usb_hal_supported_modes_defaults", }'
            echo 'cc_defaults { name: "extended_compress_format_defaults", }'
            echo 'cc_defaults { name: "qti_kernel_headers_defaults", }'
            echo 'cc_defaults { name: "generated_kernel_includes", }'
            # Camera defaults
            echo 'cc_defaults { name: "camera_needs_client_info_defaults", }'
            echo 'cc_defaults { name: "camera_needs_client_info_lib_defaults", }'
            echo 'cc_defaults { name: "camera_parameter_library_defaults", }'
            echo 'cc_defaults { name: "no_cameraserver_defaults", }'
            echo 'cc_defaults { name: "camera_in_mediaserver_defaults", }'
            echo 'cc_defaults { name: "needs_camera_boottime", }'
            echo 'cc_defaults { name: "needs_camera_boottime_defaults", }'
            # Display/graphics defaults
            echo 'cc_defaults { name: "gralloc_10_usage_bits_defaults", }'
            echo 'cc_defaults { name: "surfaceflinger_fod_lib_defaults", }'
            echo 'cc_defaults { name: "surfaceflinger_udfps_lib_defaults", }'
            # Network defaults
            echo 'cc_defaults { name: "needs_netd_direct_connect_rule_defaults", }'
            echo 'cc_defaults { name: "ignores_ftp_pptp_conntrack_failure", }'
            # Misc defaults
            echo 'cc_defaults { name: "target_uses_prebuilt_dynamic_partitions_defaults", }'
            echo 'cc_defaults { name: "nvidia_enhancements_defaults", }'
            echo 'cc_defaults { name: "inputdispatcher_skip_event_key_defaults", }'
            # Library headers stubs
            echo 'cc_library_headers { name: "generated_kernel_headers", vendor_available: true, recovery_available: true, }'
          } > /tmp/hybris_stubs.bp
          
          echo "Created hybris_stubs.bp with all cc_defaults"
          cat /tmp/hybris_stubs.bp

          # Put stubs in ONLY ONE place - device tree
          # Soong scans ALL Android.bp files globally, so modules only need to exist once
          mkdir -p device/xiaomi/raphael
          cp /tmp/hybris_stubs.bp device/xiaomi/raphael/Android.bp
          echo "Stubs placed in device/xiaomi/raphael/Android.bp ONLY"
          
          # Fix namespace issue for fingerprint - remove it since not needed for hybris-hal
          rm -f device/xiaomi/raphael/fingerprint/Android.bp || true
          
          # Remove WfdCommon (Wireless Display) - causes dex jar path issue, not needed for hybris
          find . -name "*.mk" -exec grep -l "WfdCommon" {} \; 2>/dev/null | while read f; do
            sed -i 's/WfdCommon//g' "$f" 2>/dev/null || true
          done
          rm -rf vendor/qcom/opensource/wfd 2>/dev/null || true
          
          # Remove chromium-webview reference (prebuilt not synced)
          rm -rf external/chromium-webview 2>/dev/null || true
          mkdir -p external/chromium-webview
          echo "# Stub" > external/chromium-webview/Android.mk
          
          # Disable instrumentation tests (BluetoothInstrumentationTests not available)
          rm -f platform_testing/build/tasks/tests/instrumentation_test_list.mk 2>/dev/null || true
          touch platform_testing/build/tasks/tests/instrumentation_test_list.mk 2>/dev/null || true
          
          # Fix kernel defconfig path - create expected symlink
          # PE kernel has defconfig at arch/arm64/configs/vendor/raphael_defconfig
          # Device tree expects arch/configs/raphael_user_defconfig
          if [ -d kernel/xiaomi/raphael ]; then
            mkdir -p kernel/xiaomi/raphael/arch/configs
            # Try to find the actual defconfig
            DEFCONFIG=$(find kernel/xiaomi/raphael -name "*raphael*defconfig" 2>/dev/null | head -1)
            if [ -n "$DEFCONFIG" ]; then
              cp "$DEFCONFIG" kernel/xiaomi/raphael/arch/configs/raphael_user_defconfig
              echo "Copied $DEFCONFIG to arch/configs/raphael_user_defconfig"
            else
              # Create minimal defconfig pointing to arm64 defconfig
              echo "# Redirect to actual defconfig" > kernel/xiaomi/raphael/arch/configs/raphael_user_defconfig
              cat kernel/xiaomi/raphael/arch/arm64/configs/vendor/sm8150-perf_defconfig >> kernel/xiaomi/raphael/arch/configs/raphael_user_defconfig 2>/dev/null || \
              cat kernel/xiaomi/raphael/arch/arm64/configs/raphael_defconfig >> kernel/xiaomi/raphael/arch/configs/raphael_user_defconfig 2>/dev/null || \
              echo "CONFIG_LOCALVERSION=\"-hybris\"" > kernel/xiaomi/raphael/arch/configs/raphael_user_defconfig
            fi
            ls -la kernel/xiaomi/raphael/arch/configs/
          fi
          
          # Create dummy dtbo.img - hybris-boot needs it but we'll use stock dtbo
          mkdir -p out/target/product/raphael
          # Create a minimal valid dtbo.img (just a header)
          printf '\xd7\xb7\xab\x1e\x00\x00\x00\x00\x00\x00\x00\x20\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00' > out/target/product/raphael/dtbo.img
          echo "Created stub dtbo.img"
          
          # Fix kernel build - use system clang to avoid GCC 11 relocation errors
          if [ -f device/xiaomi/raphael/BoardConfig.mk ]; then
            if ! grep -q "KERNEL_MAKE_CMD" device/xiaomi/raphael/BoardConfig.mk; then
              echo "" >> device/xiaomi/raphael/BoardConfig.mk
              echo "# Fix kernel build for hybris - use system clang" >> device/xiaomi/raphael/BoardConfig.mk
              echo "KERNEL_MAKE_CMD := make" >> device/xiaomi/raphael/BoardConfig.mk
              echo "TARGET_KERNEL_ARCH := arm64" >> device/xiaomi/raphael/BoardConfig.mk
              echo "KERNEL_ARCH := arm64" >> device/xiaomi/raphael/BoardConfig.mk
              echo "# Use system clang for kernel (avoids GCC 11 relocation errors)" >> device/xiaomi/raphael/BoardConfig.mk
              echo "TARGET_KERNEL_CLANG_COMPILE := true" >> device/xiaomi/raphael/BoardConfig.mk
              echo 'TARGET_KERNEL_CROSS_COMPILE_PREFIX := aarch64-linux-gnu-' >> device/xiaomi/raphael/BoardConfig.mk
              echo 'TARGET_KERNEL_CROSS_COMPILE_ARM32_PREFIX := arm-linux-gnueabi-' >> device/xiaomi/raphael/BoardConfig.mk
              echo "Added kernel build variables to BoardConfig.mk"
            fi
          fi
          
          # Export cross-compile and clang variables for kernel build
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          export CC=clang
          export CLANG_TRIPLE=aarch64-linux-gnu-
          
          # Source the build environment
          set +e
          source build/envsetup.sh 2>&1
          set -e
          
          # Try lunch, fallback to manual TARGET setup
          if ! lunch aosp_raphael-userdebug 2>/dev/null; then
            echo "lunch failed, setting up environment manually..."
            export TARGET_PRODUCT=aosp_raphael
            export TARGET_BUILD_VARIANT=userdebug
            export TARGET_BUILD_TYPE=release
            export OUT_DIR=out
          fi

          # Free space
          rm -rf .repo || true

          # Create missing apns-full-conf.xml (LineageOS dependency)
          mkdir -p device/sample/etc
          echo '<?xml version="1.0" encoding="utf-8"?>' > device/sample/etc/apns-full-conf.xml
          echo '<apns version="8"></apns>' >> device/sample/etc/apns-full-conf.xml

          # First run make to build kernel and check if Image.gz-dtb was created
          make -j$(nproc --all) bootimage || true
          
          # Find and copy kernel to expected location (handles out-of-tree builds)
          # Kernel may output to kernel/xiaomi/raphael/out/ instead of out/
          KERNEL_OUT="$ANDROID_ROOT/out/target/product/$DEVICE/obj/KERNEL_OBJ"
          KERNEL_BOOT="$KERNEL_OUT/arch/arm64/boot"
          
          # Search for the actual kernel image location (search entire tree)
          echo "=== Finding kernel images ==="
          find "$ANDROID_ROOT" -name "Image.gz" -type f 2>/dev/null | head -5
          
          # Create the expected directory if needed
          mkdir -p "$KERNEL_BOOT"
          
          # Find Image.gz anywhere in the tree (kernel outputs to nested out/ inside kernel source)
          FOUND_IMAGE=$(find "$ANDROID_ROOT" -path "*/arch/arm64/boot/Image.gz" -type f 2>/dev/null | head -1)
          if [ -n "$FOUND_IMAGE" ]; then
            echo "Found kernel at: $FOUND_IMAGE"
            cp "$FOUND_IMAGE" "$KERNEL_BOOT/Image.gz"
            # Also create Image.gz-dtb as copy (hybris can use either)
            cp "$FOUND_IMAGE" "$KERNEL_BOOT/Image.gz-dtb"
            # Copy to product dir kernel location
            mkdir -p "$ANDROID_ROOT/out/target/product/$DEVICE"
            cp "$FOUND_IMAGE" "$ANDROID_ROOT/out/target/product/$DEVICE/kernel"
            # Also copy .config for later checks
            FOUND_CONFIG=$(dirname "$(dirname "$(dirname "$FOUND_IMAGE")")")/.config
            if [ -f "$FOUND_CONFIG" ]; then
              cp "$FOUND_CONFIG" "$KERNEL_OUT/.config"
            fi
            echo "Kernel copied to expected locations"
          else
            echo "ERROR: Could not find Image.gz anywhere"
            find "$ANDROID_ROOT" -name "Image*" -type f 2>/dev/null | head -10
          fi
          
          # Now build hybris-hal
          make -j$(nproc --all) hybris-hal droidmedia || make -j$(nproc --all) hybris-boot

      - name: Upload HAL Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hal-output
          path: |
            ${{ env.ANDROID_ROOT }}/out/target/product/${{ env.DEVICE }}/hybris-boot.img
            ${{ env.ANDROID_ROOT }}/out/target/product/${{ env.DEVICE }}/droidmedia*.tgz
            ${{ env.ANDROID_ROOT }}/out/target/product/${{ env.DEVICE }}/*.img
            ${{ env.ANDROID_ROOT }}/system/core/include/
            ${{ env.ANDROID_ROOT }}/system/core/libcutils/include/
            ${{ env.ANDROID_ROOT }}/system/libbase/include/
            ${{ env.ANDROID_ROOT }}/out/target/product/${{ env.DEVICE }}/obj/include/
            ${{ env.ANDROID_ROOT }}/out/soong/.intermediates/system/core/fs_mgr/libfs_avb/android_arm64_armv8-a_static/gen/
          retention-days: 14

  build-dhd:
    needs: build-hal
    if: ${{ always() && (needs.build-hal.result == 'success' || needs.build-hal.result == 'skipped') }}
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download HAL Artifacts (from current run)
        if: ${{ inputs.skip_hal != true }}
        uses: actions/download-artifact@v4
        with:
          name: hal-output
          path: ${{ env.ANDROID_ROOT }}/

      - name: Download HAL Artifacts (from specified run)
        if: ${{ inputs.skip_hal == true && inputs.hal_run_id != '' }}
        uses: actions/download-artifact@v4
        with:
          name: hal-output
          path: ${{ env.ANDROID_ROOT }}/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.hal_run_id }}

      - name: Build DHD in Docker container
        run: |
          cd $ANDROID_ROOT
          rm -rf .repo || true
          
          # Create generated_android_filesystem_config.h with proper android_ids definitions
          # Must be self-contained since Android 11 doesn't define android_id_info struct in headers
          printf '%s\n' \
            '#pragma once' \
            '#include <private/android_filesystem_config.h>' \
            '' \
            '/* Define the struct since Android 11 headers do not export it */' \
            'struct android_id_info {' \
            '    const char* name;' \
            '    unsigned aid;' \
            '};' \
            '' \
            'static const struct android_id_info android_ids[] = {' \
            '    { "root",          AID_ROOT },' \
            '    { "system",        AID_SYSTEM },' \
            '    { "radio",         AID_RADIO },' \
            '    { "bluetooth",     AID_BLUETOOTH },' \
            '    { "graphics",      AID_GRAPHICS },' \
            '    { "input",         AID_INPUT },' \
            '    { "audio",         AID_AUDIO },' \
            '    { "camera",        AID_CAMERA },' \
            '    { "log",           AID_LOG },' \
            '    { "compass",       AID_COMPASS },' \
            '    { "mount",         AID_MOUNT },' \
            '    { "wifi",          AID_WIFI },' \
            '    { "adb",           AID_ADB },' \
            '    { "install",       AID_INSTALL },' \
            '    { "media",         AID_MEDIA },' \
            '    { "dhcp",          AID_DHCP },' \
            '    { "sdcard_rw",     AID_SDCARD_RW },' \
            '    { "vpn",           AID_VPN },' \
            '    { "keystore",      AID_KEYSTORE },' \
            '    { "usb",           AID_USB },' \
            '    { "drm",           AID_DRM },' \
            '    { "mdnsr",         AID_MDNSR },' \
            '    { "gps",           AID_GPS },' \
            '    { "media_rw",      AID_MEDIA_RW },' \
            '    { "mtp",           AID_MTP },' \
            '    { "nfc",           AID_NFC },' \
            '    { "sdcard_r",      AID_SDCARD_R },' \
            '    { "clat",          AID_CLAT },' \
            '    { "loop_radio",    AID_LOOP_RADIO },' \
            '    { "mediadrm",      AID_MEDIADRM },' \
            '    { "package_info",  AID_PACKAGE_INFO },' \
            '    { "sdcard_pics",   AID_SDCARD_PICS },' \
            '    { "sdcard_av",     AID_SDCARD_AV },' \
            '    { "sdcard_all",    AID_SDCARD_ALL },' \
            '    { "logd",          AID_LOGD },' \
            '    { "shared_relro",  AID_SHARED_RELRO },' \
            '    { "audioserver",   AID_AUDIOSERVER },' \
            '    { "cameraserver",  AID_CAMERASERVER },' \
            '    { "firewall",      AID_FIREWALL },' \
            '    { "dns",           AID_DNS },' \
            '    { "statsd",        AID_STATSD },' \
            '    { "incidentd",     AID_INCIDENTD },' \
            '    { "lmkd",          AID_LMKD },' \
            '    { "gpu_service",   AID_GPU_SERVICE },' \
            '    { "network_stack", AID_NETWORK_STACK },' \
            '    { "shell",         AID_SHELL },' \
            '    { "cache",         AID_CACHE },' \
            '    { "diag",          AID_DIAG },' \
            '    { "net_bt_admin",  AID_NET_BT_ADMIN },' \
            '    { "net_bt",        AID_NET_BT },' \
            '    { "inet",          AID_INET },' \
            '    { "net_raw",       AID_NET_RAW },' \
            '    { "net_admin",     AID_NET_ADMIN },' \
            '    { "net_bw_stats",  AID_NET_BW_STATS },' \
            '    { "net_bw_acct",   AID_NET_BW_ACCT },' \
            '    { "readproc",      AID_READPROC },' \
            '    { "wakelock",      AID_WAKELOCK },' \
            '    { "uhid",          AID_UHID },' \
            '    { "everybody",     AID_EVERYBODY },' \
            '    { "misc",          AID_MISC },' \
            '    { "nobody",        AID_NOBODY },' \
            '};' \
            '' \
            'static const unsigned int android_id_count = sizeof(android_ids) / sizeof(android_ids[0]);' \
            > "$ANDROID_ROOT/generated_android_filesystem_config.h"

          #------------------------------------------
          # Copy local RPM packaging repos (from checked-out workspace)
          #------------------------------------------
          WORKSPACE=${{ github.workspace }}
          
          # Set git identity for local commits
          git config --global user.email "ci@github.com"
          git config --global user.name "Github Actions"
          
          # hybris-installer from ginkgo (for mkbootfs, etc.)
          git clone https://github.com/sailfish-on-ginkgo/hybris-installer.git \
            $ANDROID_ROOT/hybris/hybris-installer || true

          # Copy droid-hal-raphael (contains HAL packaging)
          mkdir -p $ANDROID_ROOT/rpm
          cp -r $WORKSPACE/droid-hal-raphael/rpm/* $ANDROID_ROOT/rpm/
          cd $ANDROID_ROOT/rpm
          git init && git add -A && git commit -m "init" || true
          # Clone the dhd submodule
          git clone https://github.com/mer-hybris/droid-hal-device.git $ANDROID_ROOT/rpm/dhd --depth=1
          
          # Patch usergroupgen.c to include our generated_android_filesystem_config.h
          # The original only includes <private/android_filesystem_config.h> which has AID_* but NOT android_ids[]
          sed -i '/^#include.*android_filesystem_config\.h/a #include "generated_android_filesystem_config.h"' \
            $ANDROID_ROOT/rpm/dhd/helpers/usergroupgen.c

          # Copy droid-config-raphael (contains sparse overlays, patterns)
          mkdir -p $ANDROID_ROOT/hybris/droid-configs
          cp -r $WORKSPACE/droid-config-raphael/* $ANDROID_ROOT/hybris/droid-configs/
          cd $ANDROID_ROOT/hybris/droid-configs
          git init && git add -A && git commit -m "init" || true
          # Clone the droid-configs-device submodule
          git clone https://github.com/mer-hybris/droid-hal-configs.git $ANDROID_ROOT/hybris/droid-configs/droid-configs-device --depth=1

          # Copy droid-hal-version-raphael
          mkdir -p $ANDROID_ROOT/hybris/droid-hal-version-raphael
          cp -r $WORKSPACE/droid-hal-version-raphael/* $ANDROID_ROOT/hybris/droid-hal-version-raphael/
          cd $ANDROID_ROOT/hybris/droid-hal-version-raphael
          git init && git add -A && git commit -m "init" || true
          # Clone the droid-hal-version submodule
          git clone https://github.com/mer-hybris/droid-hal-version.git $ANDROID_ROOT/hybris/droid-hal-version-raphael/rpm/droid-hal-version --depth=1

          #------------------------------------------
          # Setup Docker workspace
          #------------------------------------------
          sudo mkdir -p /home/runner/work/sailfish-raphael-ci/sailfish-raphael-ci/docker

          #------------------------------------------
          # Copy helpers scripts
          #------------------------------------------
          cd ${{ github.workspace }}
          chmod +x build-rpm.sh || true
          chmod +x helpers/*.sh || true

          #------------------------------------------
          # Run DHD build in Docker
          #------------------------------------------
          sudo docker run --privileged \
            -v /home/runner/work:/home/mersdk/work \
            coderus/sailfishos-platform-sdk:$SAILFISH_SDK_VERSION \
            /bin/sh /home/mersdk/work/sailfish-raphael-ci/sailfish-raphael-ci/build-rpm.sh

      - name: Upload SailfishOS ZIP
        uses: actions/upload-artifact@v4
        with:
          name: sailfishos-zip
          path: |
            ${{ env.ANDROID_ROOT }}/SailfishOScommunity-*/sailfishos-*.zip
            ${{ env.ANDROID_ROOT }}/SailfishOS-*/sailfishos-*.zip
            ${{ env.ANDROID_ROOT }}/SailfishOScommunity-*/*.zip
            ${{ env.ANDROID_ROOT }}/SailfishOS-*/*.zip

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            ${{ env.ANDROID_ROOT }}/SailfishOScommunity-*/*-${{ env.DEVICE }}*.zip
            ${{ env.ANDROID_ROOT }}/SailfishOS-*/*-${{ env.DEVICE }}*.zip
